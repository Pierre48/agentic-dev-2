name: Autonomous Issue Solver (mini-SWE-agent)

on:
  issues:
    types: [assigned]

jobs:
  solve_issue:
    # Replace 'company-swe-agent' with your bot's handle or your username
    if: github.event.assignee.login == 'Pierre48' 
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mini-SWE-agent Framework
        run: |
          pip install uv
          uv venv .venv
          # Install the correct, modern package name
          .venv/bin/pip install mini-swe-agent

      - name: Run SWE-agent End-to-End Execution
        env:
          GITHUB_TOKEN: ${{ secrets.SWE_AGENT_GITHUB_PAT }} 
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Use 'mini' to analyze the issue and generate the PR code fix
          .venv/bin/mini \
            --model "gemini/gemini-3.5-flash" \
            --task "Fix the issue described here: https://github.com/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
            --repo-path "."