name: Autonomous Issue Solver (mini-SWE-agent)

on:
  issues:
    types: [assigned]

jobs:
  solve_issue:
    # Replace 'company-swe-agent' with your bot's handle or your username
    if: github.event.assignee.login == 'Pierre48' 
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mini-SWE-agent Framework
        run: |
          pip install uv
          uv venv .venv
          # Install the correct, modern package name
          uv pip install mini-swe-agent


      - name: Run SWE-agent End-to-End Execution
        env:
          GITHUB_TOKEN: ${{ secrets.SWE_AGENT_GITHUB_PAT }} 
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MSWEA_CONFIGURED: true
          
        run: |
          # We pass the model directly with -m to completely skip the global config wizard
          .venv/bin/mini -m "gemini/gemini-2.5-flash" --yolo --task "Please fix the problem outlined in this GitHub issue: https://github.com/${{ github.repository }}/issues/${{ github.event.issue.number }}"