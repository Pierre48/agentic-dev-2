name: Autonomous Issue Solver (mini-SWE-agent)

on:
  issues:
    types: [assigned]

jobs:
  solve_issue:
    # Replace 'company-swe-agent' with your bot's handle or your username
    if: github.event.assignee.login == 'Pierre48' 
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install mini-SWE-agent Framework
        run: |
          pip install uv
          uv venv .venv
          # Install the correct, modern package name
          uv pip install mini-swe-agent


      - name: Run SWE-agent End-to-End Execution
        env:
          GITHUB_TOKEN: ${{ secrets.SWE_AGENT_GITHUB_PAT }} 
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MSWEA_CONFIGURED: true
          
        run: |
          # Créer une branche dédiée pour la correction
          git checkout -b "fix/issue-${{ github.event.issue.number }}"
          
          # Lancement de l'agent (il va modifier les fichiers localement)
          echo "" | .venv/bin/mini -m "anthropic/claude-haiku-4-5" --yolo --task "Please fix the problem outlined in this GitHub issue: https://github.com/${{ github.repository }}/issues/${{ github.event.issue.number }}"

      - name: Push Changes and Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.SWE_AGENT_GITHUB_PAT }}
        run: |
          # On vérifie si l'agent a effectivement modifié des fichiers
          if [ -n "$(git status --porcelain)" ]; then
            echo "L'agent a trouvé une solution ! Création de la PR..."
            git add .
            git commit -m "fix: resolve issue #${{ github.event.issue.number }} via mini-SWE-agent"
            git push origin "fix/issue-${{ github.event.issue.number }}" --force
            
            # Création de la Pull Request automatique via la CLI GitHub (gh)
            gh pr create \
              --title "Fix #${{ github.event.issue.number }} via SWE-agent" \
              --body "Cette PR a été générée automatiquement par mini-SWE-agent pour résoudre l'issue #${{ github.event.issue.number }}." \
              --base main \
              --head "fix/issue-${{ github.event.issue.number }}"
          else
            echo "L'agent n'a fait aucune modification."
          fi